{{define "content"}}
<div class="page-hdr">
  <div class="page-hdr-text">
    <h1>MCP</h1>
    <p>An AI agent drives dnsmasq through this console's API via the Model Context Protocol</p>
  </div>
</div>

<!-- Hero: integration status + write kill-switch -->
<div class="mcp-hero">
  <div class="mcp-hero-status">
    <span class="mcp-beacon" id="mcp-beacon"><span class="mcp-beacon-dot"></span></span>
    <div class="mcp-hero-text">
      <div class="mcp-hero-title" id="mcp-state">Ready</div>
      <div class="mcp-hero-sub" id="mcp-substate">Checking…</div>
      <div class="mcp-hero-client mono" id="mcp-client">—</div>
    </div>
  </div>

  <div class="mcp-hero-writes">
    <div class="mcp-writes-head">
      <span class="mcp-writes-label">Write access</span>
      <span id="mcp-writes-badge"></span>
    </div>
    <label class="mcp-switch">
      <input type="checkbox" id="mcp-writes-toggle"><span class="toggle-track"></span>
      <span class="mcp-switch-text" id="mcp-writes-text">Writable</span>
    </label>
    <p class="mcp-note" id="mcp-writes-note"></p>
  </div>
</div>

<!-- Metrics -->
<div class="mcp-metrics">
  <div class="mcp-metric">
    <div class="mcp-metric-val" id="mcp-total">0</div>
    <div class="mcp-metric-label">Total calls</div>
  </div>
  <div class="mcp-metric">
    <div class="mcp-metric-val" id="mcp-blocked">0</div>
    <div class="mcp-metric-label">Blocked writes</div>
  </div>
  <div class="mcp-metric">
    <div class="mcp-metric-val" id="mcp-lastseen">—</div>
    <div class="mcp-metric-label">Last activity</div>
  </div>
</div>

<!-- Recent calls -->
<div class="card fill">
  <div class="card-header">
    <div class="card-title">Recent MCP calls</div>
    <span class="card-hint" id="mcp-recent-count"></span>
  </div>
  <div class="card-body p0 scroll-y" id="mcp-recent"></div>
</div>
{{end}}
