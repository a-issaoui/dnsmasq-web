<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · dnsmasq</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230b1020'/><circle cx='16' cy='16' r='6.5' fill='none' stroke='%2338e1ff' stroke-width='2'/><line x1='16' y1='3' x2='16' y2='9' stroke='%2338e1ff' stroke-width='2'/><line x1='16' y1='23' x2='16' y2='29' stroke='%2338e1ff' stroke-width='2'/><line x1='3' y1='16' x2='9' y2='16' stroke='%2338e1ff' stroke-width='2'/><line x1='23' y1='16' x2='29' y2='16' stroke='%2338e1ff' stroke-width='2'/></svg>">
  <link rel="preload" href="/static/fonts/ibm-plex-sans-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/fonts.css">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: linear-gradient(160deg, var(--bg2), var(--bg1));
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-1);
      padding: 34px 30px 30px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }
    .login-brand svg { width: 34px; height: 34px; color: var(--cyan); }
    .login-brand-name { font-size: 17px; font-weight: 650; letter-spacing: -.01em; }
    .login-brand-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 2px;
    }
    .login-form { display: flex; flex-direction: column; gap: 12px; }
    .login-error {
      font-size: 12.5px;
      color: var(--red);
      min-height: 17px;
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <form class="login-card login-form" id="login-form">
      <div class="login-brand">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.6" />
          <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.6" />
          <line x1="12" y1="1.5" x2="12" y2="6" stroke="currentColor" stroke-width="1.6" />
          <line x1="12" y1="18" x2="12" y2="22.5" stroke="currentColor" stroke-width="1.6" />
        </svg>
        <div>
          <div class="login-brand-name">dnsmasq</div>
          <div class="login-brand-sub">web console</div>
        </div>
      </div>
      <input class="form-input" type="password" id="password" placeholder="Password"
        autocomplete="current-password" autofocus required>
      <button class="btn btn-primary" type="submit">Sign in</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('login-error');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.textContent = '';
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok) { location.href = '/'; return; }
        errEl.textContent = data.error || 'Sign-in failed (' + r.status + ')';
      } catch {
        errEl.textContent = 'Network error — is dnsmasq-web still running?';
      }
    });
  </script>
</body>

</html>
