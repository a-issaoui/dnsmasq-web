name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # dnsmasq makes the writer tests exercise real --test validation;
      # they pass without it too (validation degrades to a no-op).
      - name: Install dnsmasq (for --test validation coverage)
        run: sudo apt-get update -q && sudo apt-get install -y -q dnsmasq

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:" && echo "$out" && exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -buildvcs=false ./...

      - name: Tests (race + coverage)
        run: go test -race -count=1 -coverprofile=cover.out ./...

      - name: Coverage summary
        run: go tool cover -func=cover.out | tail -3

      - name: Shell script syntax
        run: bash -n scripts/install.sh scripts/dnsmasq-manager.sh
